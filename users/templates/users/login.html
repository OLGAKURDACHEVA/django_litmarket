<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в LitMarket</title>
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

  <div class="auth-card">
    <a href="{% url 'index' %}" class="auth-logo">
      <span class="auth-logo-text">LitMarket</span>
    </a>

    <h1 class="auth-title">Авторизация</h1>

    <form action="{% url 'users:login' %}" method="post">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="{{ form.username.id_for_label }}">Имя пользователя</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}"
                 class="form-input" placeholder="Введите имя"
                 {% if form.username.value %}value="{{ form.username.value }}"{% endif %}>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                 class="form-input" placeholder="Введите пароль">
        </div>
      </div>

      <button type="submit" class="auth-btn">Авторизоваться</button>

      <div class="auth-links">
        <a href="#" class="forgot-link">Забыли пароль?</a>
      </div>
    </form>

    <div class="auth-footer">
      <span>Нужен аккаунт?</span>
      <a href="{% url 'users:register' %}">Зарегистрируйся!</a>
    </div>
  </div>
</body>
</html>
